<!-- admin.component.html -->
<div class="min-h-screen bg-stone-100 flex">

    <!-- ══════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════ -->
    <aside [class]="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
        class="fixed inset-y-0 left-0 z-40 w-64 bg-green-950 flex flex-col transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-auto">

        <!-- Brand -->
        <div class="flex items-center gap-3 px-6 py-5 border-b border-green-800/60">
            <div class="leading-tight">
                <p class="text-white font-bold text-sm">Amiani's Flies</p>
                <p class="text-green-400 text-xs">Admin Panel</p>
            </div>
        </div>

        <!-- Nav links -->
        <nav class="flex-1 px-3 py-5 space-y-0.5 overflow-y-auto">
            <p class="text-green-600 text-xs font-semibold uppercase tracking-widest px-3 pb-3">Main</p>

            <a *ngFor="let item of navItems" [routerLink]="item.path" routerLinkActive="bg-green-700 text-white"
                [routerLinkActiveOptions]="{ exact: item.exact }" (click)="sidebarOpen = false"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-green-300 hover:bg-green-800/50 hover:text-white cursor-pointer transition-all select-none">
                {{ item.label }}
            </a>
        </nav>

        <!-- User strip -->
        <div class="px-4 py-4 border-t border-green-800/60 flex items-center gap-3">
            <div
                class="w-8 h-8 rounded-full bg-green-700 flex items-center justify-center text-white text-sm font-bold shrink-0">
                A
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-white text-sm font-medium truncate">Amiani</p>
                <p class="text-green-400 text-xs truncate">Administrator</p>
            </div>
            <button class="text-green-500 hover:text-white transition-colors" title="Sign out">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
                </svg>
            </button>
        </div>
    </aside>

    <!-- Mobile overlay -->
    <div *ngIf="sidebarOpen" (click)="sidebarOpen = false" class="fixed inset-0 z-30 bg-black/50 lg:hidden">
    </div>


    <!-- ══════════════════════════════════════
       MAIN AREA
  ══════════════════════════════════════ -->
    <div class="flex-1 flex flex-col min-w-0">

        <!-- Top bar -->
        <header
            class="bg-white border-b border-stone-200 px-4 sm:px-6 py-4 flex items-center gap-4 sticky top-0 z-20 shadow-sm">
            <!-- Hamburger (mobile only) -->
            <button (click)="sidebarOpen = !sidebarOpen"
                class="lg:hidden p-2 rounded-lg text-stone-500 hover:bg-stone-100 transition-colors">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="sidebarOpen
                  ? 'M6 18L18 6M6 6l12 12'
                  : 'M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5'" />
                </svg>
            </button>

            <div>
                <h1 class="font-bold text-stone-800 text-base leading-none">Admin Panel</h1>
                <p class="text-stone-400 text-xs mt-0.5">Amiani's Fishing Flies</p>
            </div>

            <div class="flex-1"></div>

            <p class="hidden sm:block text-stone-400 text-sm">{{ today }}</p>
        </header>

        <!-- Router outlet — each admin page loads here -->
        <main class="flex-1 p-4 sm:p-6">
            <router-outlet></router-outlet>
        </main>

    </div>
</div>

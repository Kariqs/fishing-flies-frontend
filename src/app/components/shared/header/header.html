<header class="fixed top-0 left-0 right-0 z-50 bg-white shadow-sm border-b border-green-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">

            <a routerLink="/" class="flex items-center gap-2.5 group shrink-0">
                <span class="text-green-900 font-bold text-lg tracking-tight leading-none uppercase">
                    Amiani's Fishing Flies
                </span>
            </a>

            <nav class="hidden md:flex items-center gap-1">
                <a *ngFor="let link of navLinks" [routerLink]="link.path" routerLinkActive="text-green-700 bg-green-50"
                    [routerLinkActiveOptions]="{ exact: link.exact }"
                    class="relative px-4 py-2 rounded-full text-sm font-medium text-stone-600 hover:text-green-700 hover:bg-green-50 transition-all">
                    {{ link.label }}
                </a>

                <button
                    class="relative ml-2 p-2 text-stone-500 hover:text-green-700 transition-colors rounded-full hover:bg-green-50"
                    aria-label="Cart">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
                    </svg>
                    <span *ngIf="cartCount > 0"
                        class="absolute top-0.5 right-0.5 bg-green-600 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center leading-none">
                        {{ cartCount }}
                    </span>
                </button>

                <a routerLink="/shop"
                    class="ml-2 inline-flex items-center gap-1.5 bg-green-700 hover:bg-green-600 active:bg-green-800 text-white text-sm font-semibold px-5 py-2 rounded-full shadow-sm hover:shadow transition-all">
                    Shop Now
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                    </svg>
                </a>
            </nav>

            <div class="flex items-center gap-2 md:hidden">
                <button class="relative p-2 text-stone-500 hover:text-green-700 transition-colors rounded-full"
                    aria-label="Cart">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
                    </svg>
                    <span *ngIf="cartCount > 0"
                        class="absolute top-0.5 right-0.5 bg-green-600 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">
                        {{ cartCount }}
                    </span>
                </button>

                <button (click)="toggleMenu()"
                    class="p-2 rounded-full text-stone-600 hover:text-green-700 hover:bg-green-50 transition-all"
                    [attr.aria-expanded]="isOpen" aria-label="Toggle menu">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            [attr.d]="isOpen ? 'M6 18L18 6M6 6l12 12' : 'M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5'" />
                    </svg>
                </button>
            </div>

        </div>
    </div>

    <div *ngIf="isOpen" class="md:hidden bg-white border-t border-green-100 px-4 pt-3 pb-5 space-y-1 shadow-lg">
        <a *ngFor="let link of navLinks" [routerLink]="link.path"
            routerLinkActive="text-green-700 bg-green-50 font-semibold"
            [routerLinkActiveOptions]="{ exact: link.exact }" (click)="closeMenu()"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-stone-600 hover:text-green-700 hover:bg-green-50 transition-all">
            <span class="w-1.5 h-1.5 rounded-full bg-green-400 shrink-0"></span>
            {{ link.label }}
        </a>

        <div class="pt-3 border-t border-green-100">
            <a routerLink="/shop" (click)="closeMenu()"
                class="flex items-center justify-center gap-2 w-full bg-green-700 hover:bg-green-600 text-white font-semibold text-sm px-5 py-3 rounded-full shadow transition-all">
                Shop Now
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                </svg>
            </a>
        </div>
    </div>

</header>

<div class="h-16"></div>

<!-- product-card.component.html -->
<div
    class="bg-white rounded-sm border border-stone-100 hover:border-green-200 shadow-sm hover:shadow-md transition-all duration-200 overflow-hidden flex flex-col group">

    <!-- Image -->
    <div class="relative aspect-4/3 bg-green-50 overflow-hidden">
        @if (fly.imageUrl) {
        <img [src]="fly.imageUrl" [alt]="fly.name"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
        } @else {
        <div class="w-full h-full flex items-center justify-center">
            <svg class="w-8 h-8 text-green-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="1.2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
            </svg>
        </div>
        }
        <!-- Category badge -->
        <span
            class="absolute top-2 left-2 bg-white/90 backdrop-blur-sm text-green-700 text-[10px] font-bold px-2 py-0.5 rounded-full border border-green-100 uppercase tracking-wide">
            {{ fly.category }}
        </span>
    </div>

    <!-- Info -->
    <div class="p-3 flex flex-col flex-1 gap-2">

        <!-- Name & meta -->
        <div class="flex-1 space-y-0.5">
            <h3 class="font-bold text-stone-800 text-xs leading-snug">{{ fly.name }}</h3>
            <div class="flex flex-wrap gap-x-1.5 gap-y-0.5">
                <span class="text-[10px] text-stone-400">Hook #{{ fly.hookSize }}</span>
                @if (fly.color) {
                <span class="text-[10px] text-stone-400">· {{ fly.color }}</span>
                }
                @if (fly.hookType) {
                <span class="text-[10px] text-stone-400">· {{ fly.hookType }}</span>
                }
            </div>
        </div>

        <!-- Price -->
        <p class="font-bold text-green-800 text-sm">$ {{ fly.price | number }}</p>

        <!-- Buttons -->
        <div class="flex gap-1.5 pt-1 border-t border-stone-50">

            <!-- Add to cart -->
            <button (click)="onAddToCart()"
                class="flex-1 inline-flex items-center justify-center gap-1 bg-green-700 hover:bg-green-600 active:bg-green-800 text-white text-[11px] font-semibold py-1.5 rounded-md transition-colors">
                <svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
                </svg>
                Add
            </button>

            <!-- WhatsApp order -->
            <a [href]="whatsappUrl" target="_blank" rel="noopener noreferrer"
                class="flex-1 inline-flex items-center justify-center gap-1 bg-[#25D366] hover:bg-[#1ebe5d] active:bg-[#17a34a] text-white text-[11px] font-semibold py-1.5 rounded-md transition-colors">
                <!-- WhatsApp icon -->
                <svg class="w-3 h-3 shrink-0" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
                </svg>
                Order
            </a>

        </div>
    </div>
</div>
